<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Chess Fix - Queen & Checkmate</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .chess-piece {
            width: 80%;
            height: 80%;
            cursor: grab;
            transition: transform 0.2s ease;
            z-index: 10;
            filter: drop-shadow(2px 2px 4px rgba(0, 0, 0, 0.3));
            font-weight: bold;
        }

        .chess-piece:hover {
            transform: scale(1.05);
            filter: drop-shadow(4px 4px 8px rgba(0, 0, 0, 0.4));
        }

        .chess-piece.dragging {
            cursor: grabbing;
            opacity: 0.7;
            transform: scale(1.1);
            z-index: 1000;
            filter: drop-shadow(6px 6px 12px rgba(0, 0, 0, 0.5));
        }

        .square.selected {
            background-color: rgba(255, 255, 0, 0.5) !important;
            box-shadow: inset 0 0 20px rgba(255, 255, 0, 0.8);
        }

        .square.in-check {
            background-color: rgba(255, 0, 0, 0.7) !important;
            box-shadow: inset 0 0 20px rgba(255, 0, 0, 0.9);
            animation: pulse 1s infinite;
        }

        .square.drop-target {
            background-color: rgba(76, 175, 80, 0.3) !important;
            box-shadow: inset 0 0 20px rgba(76, 175, 80, 0.5);
        }

        .legal-move::after {
            background: radial-gradient(circle, rgba(255, 255, 255, 0.8) 0%, rgba(255, 255, 255, 0.4) 100%);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .legal-capture::after {
            border: 3px solid rgba(255, 69, 0, 0.8);
            background: radial-gradient(circle, rgba(255, 69, 0, 0.2) 0%, transparent 70%);
            box-shadow: 0 0 15px rgba(255, 69, 0, 0.6);
        }

        @keyframes pulse {
            0% { box-shadow: inset 0 0 20px rgba(255, 0, 0, 0.9); }
            50% { box-shadow: inset 0 0 25px rgba(255, 0, 0, 1); }
            100% { box-shadow: inset 0 0 20px rgba(255, 0, 0, 0.9); }
        }

        .debug-info {
            background: #fff3cd;
            border: 2px solid #e74c3c;
            padding: 15px;
            margin: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .game-over-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .game-over-content {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
        }

        .game-over-content h2 {
            margin-top: 0;
            color: #333;
            font-size: 28px;
            margin-bottom: 20px;
        }

        .game-over-content button {
            padding: 15px 30px;
            font-size: 18px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .game-over-content button:hover {
            background: #229954;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-area">
            <div class="board-container">
                <div id="chessboard" class="chessboard">
                    <!-- Chess squares will be generated by JavaScript -->
                </div>
            </div>
            
            <div class="sidebar">
                <div class="game-info">
                    <h3>🎯 Complete Chess Fix</h3>
                    <div id="current-player">White's Turn</div>
                    <div id="game-status">Active</div>
                    <div class="debug-info">
                        <strong>🔧 FIXED ISSUES:</strong><br>
                        ✅ Queen check validation<br>
                        ✅ Checkmate detection<br>
                        ✅ Strict legal move filtering<br>
                        ✅ Enhanced debugging<br><br>
                        <strong>🔍 Open console (F12) for detailed logs</strong>
                    </div>
                </div>
                
                <div class="captured-pieces">
                    <h3>Captured Pieces</h3>
                    <div class="captured-white">
                        <span>White lost:</span>
                        <div id="captured-white-pieces"></div>
                    </div>
                    <div class="captured-black">
                        <span>Black lost:</span>
                        <div id="captured-black-pieces"></div>
                    </div>
                </div>
                
                <div class="move-history">
                    <h3>Move History</h3>
                    <div id="move-list"></div>
                </div>
                
                <div class="controls">
                    <button id="new-game">New Game</button>
                    <button id="resign">Resign</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="chess-complete-fix.js"></script>
</body>
</html>
